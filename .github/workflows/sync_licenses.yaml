name: Sync LICENSE.md files

on:
  push:
    paths:
      - "LICENS*.md"
  create:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-licenses:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all history and branches

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync LICENSE.md files
        run: |
          # Fetch all branches
          git fetch --all

          # Loop over all remote branches
          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/); do
            # Remove 'origin/' prefix
            name="${branch#origin/}"

            # Match version branches like 1.21.5 or 26.1.0
            if [[ "$name" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Updating branch $name"

              # Switch to version branch, create local branch if needed
              git checkout -B "$name" "origin/$name"

              # Copy all LICENS*.md files from main into this branch
              git checkout main -- LICENS*.md

              # Stage and commit changes only if there are any
              git add -A LICENS*.md
              git diff-index --quiet HEAD || {
                git commit -m "Sync license files from main [skip ci]"
                git push origin "$name"
              }
            fi
          done
